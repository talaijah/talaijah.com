<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portfolio | TALAIJAH</title>
  <meta name="description" content="Selected work by TALAIJAH, featuring websites, branding, social media, and creative marketing projects." />

  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --background: #faf9f7;
      --surface: #ffffff;
      --surface-soft: #f2eee8;
      --ink: #202321;
      --charcoal: #303330;
      --muted: #68645f;
      --line: #ded8d0;
      --accent: #6f5b45;
      --accent-dark: #202a27;
      --shadow: 0 18px 45px rgba(32, 35, 33, 0.09);
      --radius: 10px;
      --container: 1360px;
      --section-space: clamp(4rem, 7vw, 7rem);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--background);
      color: var(--ink);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .container {
      width: min(100% - clamp(1.25rem, 4vw, 4rem), var(--container));
      margin-inline: auto;
    }

    h1,
    h2,
    h3 {
      font-family: "Cormorant Garamond", serif;
      color: var(--ink);
      font-weight: 600;
      line-height: 0.98;
    }

    h1 {
      font-size: clamp(4rem, 11vw, 9.5rem);
      letter-spacing: 0.02em;
    }

    h2 {
      font-size: clamp(2.65rem, 6vw, 5rem);
      margin-bottom: 1rem;
    }

    h3 {
      font-size: clamp(1.75rem, 3vw, 2.4rem);
      margin-bottom: 0.7rem;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 0.9rem;
      color: var(--accent);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .section-header {
      max-width: 760px;
      margin-bottom: 2.5rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0.95rem 1.45rem;
      border: 1px solid var(--accent-dark);
      background: var(--accent-dark);
      color: #ffffff;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-3px);
      background: transparent;
      color: var(--accent-dark);
      box-shadow: var(--shadow);
    }

    .button-light {
      background: transparent;
      color: var(--accent-dark);
    }

    .button-light:hover,
    .button-light:focus-visible {
      background: var(--accent-dark);
      color: #ffffff;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(250, 249, 247, 0.92);
      border-bottom: 1px solid rgba(222, 216, 208, 0.8);
      backdrop-filter: blur(18px);
    }

    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color 0.25s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--accent);
    }

    .nav-brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0.18em;
    }

    .hero {
      min-height: 80vh;
      display: grid;
      align-items: center;
      padding: clamp(3rem, 6vw, 5rem) 0;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      gap: clamp(2rem, 5vw, 5rem);
      align-items: center;
    }

    .hero-copy {
      max-width: 720px;
    }

    .hero-copy p {
      max-width: 560px;
      margin-top: 1.2rem;
      font-size: clamp(1rem, 1.6vw, 1.15rem);
    }

    .hero-actions {
      margin-top: 2rem;
    }

    .hero-visual {
      position: relative;
    }

    .hero-visual::before {
      content: "";
      position: absolute;
      inset: 10% -8% -8% 12%;
      z-index: -1;
      border-radius: 28px;
      background: var(--surface-soft);
    }

    .hero-visual img {
      width: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    section {
      padding: var(--section-space) 0;
    }

    .featured {
      background: var(--surface);
      border-block: 1px solid rgba(222, 216, 208, 0.75);
    }

    .featured-card {
      display: grid;
      gap: 2rem;
      align-items: center;
      padding: clamp(1rem, 2vw, 1.5rem);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--background);
      box-shadow: 0 14px 34px rgba(32, 35, 33, 0.06);
    }

    .featured-card img,
    .project-card img,
    .social-card img,
    .gallery img {
      width: 100%;
      background: var(--surface-soft);
      object-fit: cover;
    }

    .featured-card img {
      border-radius: 8px;
      aspect-ratio: 16 / 10;
    }

    .project-details {
      display: grid;
      gap: 0.7rem;
      margin: 1.2rem 0 1.6rem;
      list-style: none;
    }

    .project-details li {
      display: flex;
      gap: 0.65rem;
      color: var(--muted);
    }

    .project-details li::before {
      content: "";
      width: 5px;
      height: 5px;
      margin-top: 0.72rem;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
    }

    .project-grid {
      display: grid;
      gap: 1.2rem;
    }

    .project-card,
    .social-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .project-card:hover,
    .social-card:hover {
      transform: translateY(-5px);
      border-color: rgba(111, 91, 69, 0.45);
      box-shadow: var(--shadow);
    }

    .project-card img {
      aspect-ratio: 16 / 10;
    }

    .project-card-body,
    .social-card-body {
      padding: 1.25rem;
    }

    .tech {
      margin: 0.8rem 0 1.1rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      border: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: color 0.25s ease, gap 0.25s ease;
    }

    .text-button:hover,
    .text-button:focus-visible {
      gap: 0.8rem;
      color: var(--accent);
    }

    .branding {
      background: var(--background);
    }

    .gallery {
      columns: 1;
      column-gap: 1rem;
    }

    .gallery button {
      display: block;
      width: 100%;
      margin-bottom: 1rem;
      overflow: hidden;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      cursor: zoom-in;
    }

    .gallery img {
      border-radius: var(--radius);
      transition: transform 0.35s ease, filter 0.35s ease;
    }

    .gallery button:hover img {
      transform: scale(1.035);
      filter: brightness(0.96);
    }

    .social {
      background: var(--surface);
      border-block: 1px solid rgba(222, 216, 208, 0.75);
    }

    .social-grid {
      display: grid;
      gap: 1.2rem;
    }

    .social-card img {
      aspect-ratio: 4 / 3;
    }

    .stat-list {
      display: grid;
      gap: 0.5rem;
      margin-top: 1rem;
      list-style: none;
    }

    .stat-list li {
      color: var(--muted);
    }

    .stat-list strong {
      color: var(--ink);
      font-weight: 700;
    }

    .content-gallery {
      columns: 1;
      column-gap: 1rem;
    }

    .content-gallery img {
      aspect-ratio: auto;
    }

    .contact {
      text-align: center;
    }

    .contact-inner {
      max-width: 760px;
      margin-inline: auto;
    }

    .contact-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem 1.4rem;
      margin: 1.4rem 0 2rem;
    }

    .contact-links a {
      color: var(--ink);
      border-bottom: 1px solid currentColor;
      transition: color 0.25s ease;
    }

    .contact-links a:hover,
    .contact-links a:focus-visible {
      color: var(--accent);
    }

    .site-footer {
      padding: 2rem 0;
      border-top: 1px solid rgba(222, 216, 208, 0.8);
      text-align: center;
    }

    .site-footer p {
      font-size: 0.88rem;
    }

    dialog {
      width: min(92vw, 900px);
      max-height: 86vh;
      margin: auto;
      border: 0;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(32, 35, 33, 0.28);
    }

    dialog::backdrop {
      background: rgba(32, 35, 33, 0.55);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      padding: clamp(1.25rem, 4vw, 2rem);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .close-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
    }

    .modal-grid {
      display: grid;
      gap: 1.2rem;
    }

    .modal-grid img {
      width: 100%;
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .lightbox-content {
      padding: 1rem;
    }

    .lightbox-content img {
      width: 100%;
      max-height: 76vh;
      object-fit: contain;
      border-radius: var(--radius);
    }

    .fade-in {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-in.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    @media (min-width: 720px) {
      .hero-grid {
        grid-template-columns: minmax(0, 0.85fr) minmax(380px, 1.15fr);
      }

      .project-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .social-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .gallery {
        columns: 2;
      }

      .content-gallery {
        columns: 3;
      }
    }

    @media (min-width: 980px) {
      .featured-card {
        grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      }

      .gallery {
        columns: 3;
      }

      .content-gallery {
        columns: 4;
      }
    }

    @media (max-width: 560px) {
      .nav {
        min-height: 64px;
      }

      .nav-brand {
        font-size: 1.25rem;
      }

      .back-link {
        font-size: 0.68rem;
      }

      .hero {
        min-height: auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

      .fade-in {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Portfolio navigation">
        <a class="back-link" href="/">← Back Home</a>
        <a class="nav-brand" href="/" aria-label="TALAIJAH home">TALAIJAH</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-copy fade-in">
          <span class="eyebrow">Selected Work</span>
          <h1>Helping businesses look as good as they are.</h1>
          <p>A curated collection of websites, branding, social media, and creative work.</p>
          <div class="hero-actions">
            <a class="button" href="#featured-projects">View Projects</a>
          </div>
        </div>
